version: '3.8'

services:
  db:
    image: postgres:15
    container_name: zack_trading_bot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zack_trading}
      POSTGRES_USER: ${POSTGRES_USER:-zack_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zack_bot_pass}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zack_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
